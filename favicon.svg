<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#faf7f0"/>

  <!-- ears (top) -->
  <rect x="2" y="0" width="2" height="1" fill="#1a1a1a"/>
  <rect x="12" y="0" width="2" height="1" fill="#1a1a1a"/>
  <rect x="1" y="1" width="4" height="1" fill="#1a1a1a"/>
  <rect x="11" y="1" width="4" height="1" fill="#1a1a1a"/>
  <rect x="1" y="2" width="1" height="1" fill="#1a1a1a"/>
  <rect x="4" y="2" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="2" width="1" height="1" fill="#1a1a1a"/>
  <rect x="14" y="2" width="1" height="1" fill="#1a1a1a"/>
  <rect x="1" y="3" width="5" height="1" fill="#1a1a1a"/>
  <rect x="10" y="3" width="5" height="1" fill="#1a1a1a"/>

  <!-- yellow ear bands -->
  <rect x="2" y="2" width="2" height="1" fill="#facc15"/>
  <rect x="12" y="2" width="2" height="1" fill="#facc15"/>

  <!-- head -->
  <rect x="1" y="4" width="14" height="1" fill="#1a1a1a"/>
  <rect x="1" y="5" width="5" height="1" fill="#1a1a1a"/>
  <rect x="10" y="5" width="5" height="1" fill="#1a1a1a"/>
  <rect x="0" y="6" width="5" height="2" fill="#1a1a1a"/>
  <rect x="11" y="6" width="5" height="2" fill="#1a1a1a"/>
  <rect x="0" y="8" width="6" height="1" fill="#1a1a1a"/>
  <rect x="10" y="8" width="6" height="1" fill="#1a1a1a"/>
  <rect x="0" y="9" width="16" height="1" fill="#1a1a1a"/>

  <!-- yellow forehead ring -->
  <rect x="6" y="5" width="4" height="1" fill="#facc15"/>
  <rect x="5" y="6" width="6" height="2" fill="#facc15"/>
  <rect x="6" y="8" width="4" height="1" fill="#facc15"/>

  <!-- cheeks / lower head -->
  <rect x="0" y="10" width="2" height="2" fill="#1a1a1a"/>
  <rect x="4" y="10" width="8" height="2" fill="#1a1a1a"/>
  <rect x="14" y="10" width="2" height="2" fill="#1a1a1a"/>
  <rect x="0" y="12" width="16" height="1" fill="#1a1a1a"/>
  <rect x="1" y="13" width="14" height="1" fill="#1a1a1a"/>
  <rect x="2" y="14" width="12" height="1" fill="#1a1a1a"/>
  <rect x="3" y="15" width="10" height="1" fill="#1a1a1a"/>

  <!-- red eyes -->
  <rect x="2" y="10" width="2" height="2" fill="#ef4444"/>
  <rect x="12" y="10" width="2" height="2" fill="#ef4444"/>
</svg>
